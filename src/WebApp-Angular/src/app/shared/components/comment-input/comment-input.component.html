<div class="flex space-x-3 w-full">
    <div class="flex-shrink-0">
    <div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 overflow-hidden">
        <span *ngIf="!currentUser?.avatar">{{ currentUser?.name?.charAt(0) || 'U' }}</span>
        <img *ngIf="currentUser?.avatar" [src]="currentUser?.avatar" alt="User avatar" class="w-full h-full object-cover" />
    </div>
    </div>
    <div class="flex-grow">
        <form (ngSubmit)="submitComment()">
            <textarea
            #commentInput
            [(ngModel)]="commentText"
            name="comment"
            rows="3"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus-ring resize-none"
            [placeholder]="placeholder"
            ></textarea>
            <div class="flex justify-end space-x-2 mt-2">
            <button 
                *ngIf="showCancel" 
                type="button" 
                class="btn btn-secondary"
                (click)="cancelReply()">
                Hủy
            </button>
            <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="!commentText.trim()">
                {{ submitLabel }}
            </button>
            </div>
        </form>
    </div>
</div>
