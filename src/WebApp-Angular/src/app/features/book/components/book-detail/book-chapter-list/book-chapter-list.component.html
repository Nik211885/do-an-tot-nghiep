<div>
      <!-- Chapter List -->
    <div class="divide-y divide-gray-100">
    <div 
        *ngFor="let chapter of displayedChapters; let i = index" 
        class="py-3 group cursor-pointer flex items-center justify-between"
    >
        <!-- Chapter Number and Title -->
        <div class="flex items-center gap-3">
        <span class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 group-hover:bg-gray-200 transition-colors">
            {{ i + 1 }}
        </span>
        <span class="font-medium group-hover:text-blue-600 transition-colors">
            {{ chapter.title }}
        </span>
        </div>
        
        <!-- Lock/Unlock Icon -->
        <span *ngIf="policy !== BookPolicy.Free && i > 2" class="h-4 w-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        </span>
        <span *ngIf="policy === BookPolicy.Free || i <= 2" class="h-4 w-4  group-hover:text-blue-600 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        </span>
    </div>
    </div>
    
    <!-- Expand/Collapse Button -->
    <button 
    *ngIf="chapters.length > displayLimit"
    (click)="toggleExpand()"
    class="w-full mt-4 py-2 text-blue-600 hover:text-blue-800 transition-colors flex items-center justify-center gap-1 bg-gray-50 hover:bg-gray-100 rounded-md"
    >
    <ng-container *ngIf="expandedChapters">
        Thu gọn 
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
        <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </ng-container>
    <ng-container *ngIf="!expandedChapters">
        Xem thêm {{ chapters.length - displayLimit }} chương 
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
        <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </ng-container>
    </button>
</div>
