<section *ngIf="currentUser " class="comments-container">
  <h2 class="text-xl font-semibold mb-6">Bình luận ({{commentCount}})</h2>

  <!-- Main comment input -->
  <div *ngIf="currentUser" class="mb-8">
    <app-comment-input
      [currentUser]="currentUser"
      submitLabel="Bình luận"
      placeholder="Viết bình luận của bạn..."
      (handleSubmit)="addComment($event)"
    ></app-comment-input>
  </div>

  <!-- Comment list -->
  <div *ngIf ="comments && currentUser" class="space-y-6">
    <app-comment
      *ngFor="let comment of comments"
      [comment]="comment"
      [currentUser]="currentUser"
      (addNewReply)="addReply($event)"
      (showMoreMessageEvent)="loadCommentReply($event)"
    ></app-comment>
  </div>
  <button
    (click)="loadCommentForBookForBook()"
    *ngIf="isNexPage"
    class="cursor-pointer w-full mt-6 inline-flex items-center justify-center space-x-2 px-6 py-3 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg shadow-sm hover:shadow-md transition-all duration-200 hover:scale-102 active:scale-98 focus:outline-none focus:ring-2 focus:ring-gray-400 dark:focus:ring-gray-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
    </svg>
    <span>Xem thêm bình luận</span>
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
    </svg>
  </button>

  <!-- Empty state -->
  <div *ngIf="comments" class="text-center py-10">
    <p *ngIf="comments.length === 0" class="text-gray-500">Chưa có bình luận nào, hãy viết bình luận của bạn</p>
  </div>
</section>
